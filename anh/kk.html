<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
<style>
.parent{
  width:200px;
  height:200px;
  background:lightblue;
  position:relative;
  animation: move 3s infinite alternate;
}

.child{
  width:60px;
  height:60px;
  background:red;
  position:absolute;
  top:0;
  left:0;
}

@keyframes move{
  from{ transform:translateX(0); }
  to{ transform:translateX(200px); }
}
</style>
<body>
  <div class="parent"></div>
  <div class="child"></div>

</body>
</head>
</html>
