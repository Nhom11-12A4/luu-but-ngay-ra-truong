<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<style>
@font-face {
    font-family: 'Fz Cat Comic';
    src: url('fonts/FzCatComic.ttf') format('truetype');
}

body {
    font-family: 'Fz Cat Comic', sans-serif;
}
.box{
  overflow:hidden;
  animation: move 1.5s ease forwards;
}
.box img{
  width:100%;
  display:block;
}
.box1{
  overflow: visible;
  animation: move1 1.5s ease forwards;
}
.box1 img{
  width:100%;
  display:block;
}
@keyframes move{
  from{
    opacity:0;
    transform: translateX(-150px);
  }
  to{
    opacity:1;
    transform: translateX(0);
  }
}
@keyframes move1{
  from{
    opacity:0;
    transform: translateY(-150px);
  }
  to{
    opacity:1;
    transform: translateY(0);
  }
}
.img-top-right{
  position: fixed;   
  top: 0;
  right: 0;
  width: 20px;
}
.img-bottom-right{
  position: fixed;   
  bottom: 0;
  right: 0;
}
.img-bottom-left{
  position: fixed;   
  bottom: 0;
  left: 0;
}
.img-top-left{
  position: fixed;   
  top: 0;
  left: 0;
}
.img-bottom-center{ position: fixed; bottom: 0; left: 15%; transform: translateX(-15%); width: 1000px; }
.text-bottom-center{
  position: fixed;
  bottom: 5%;          
  left: 40%;          
  transform: translateX(-40%);
  transform: translateY(-5%);  
  font-family: sans-serif;
  font-weight: bold;
  color: rgba(0, 109, 255, 1);
  font-family: "Fz Cat Comic", sans-serif;
  src: url("FzCatComic.ttf");
  font-size: 50px;
  height: auto;
}
.container{
  width:600px;
  height:400px;
  border:2px solid #000;

  display:grid;
  place-items:center;
}
.center{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.center img{
  max-width: 80vw;   
  max-height: 80vh;  
  object-fit: contain;
}
.vonghoa{
  width: 200px;
}
</style>
<body>
<div class="box center">
  <img src="tang thay co.png">
</div>
<div class="box img-top-right vonghoa">
  <img src="vonghoa2.png">
</div>
<div class="box img-bottom-right vonghoa">
  <img src="vonghoa.png">
</div>
<div class="box img-bottom-left vonghoa">
  <img src="vonghoa1.png">
</div>
<div class="box img-top-left vonghoa">
  <img src="vonghoa3.png">
</div>
<div class="box1 img-bottom-center">
  <img src="khungnd.png">
</div>
<div class="box1 text-bottom-center"><a href="20-11.html">20/11 NGÀY NHÀ 
<br>
  GIÁO VIỆT NAM
</div>
</body>
</html>
