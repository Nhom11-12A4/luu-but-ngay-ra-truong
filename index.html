<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title></title>
<style>
@font-face {
  font-family: 'Fz Cat Comic';
  src: url('./FzCatComic.ttf') format('truetype');
}
body {
    font-family: 'Fz Cat Comic', sans-serif;
}
  body{
  margin:0;
  height:100vh;
  background: radial-gradient(circle at bottom, #001a4d, #000814);
  overflow:hidden;
}

.stars{
  position:relative;
  width:100%;
  height:100%;
}

.star{
  position:absolute;
  width:3px;
  height:3px;
  background:white;
  border-radius:50%;
  opacity:0;
  animation: twinkle 3s infinite ease-in-out;
}

@keyframes twinkle{
  0%{
    opacity:0;
    transform:scale(0.5);
  }
  50%{
    opacity:1;
    transform:scale(2);
  }
  100%{
    opacity:0;
    transform:scale(0.5);
  }
}
.text-title{
  font-size:80px;
  font-weight:900;
  color:rgba(39,245,238,1);
  font-family:"Fz Cat Comic", sans-serif;
}
.text{
  font-size:28px;
  font-weight:400;
  color:rgba(255, 255, 255, 1);
  font-family:"Fz Cat Comic", sans-serif;
}
.text-align{
  position:absolute; 
  top:10%;
  left:50%;
  transform:translateX(-50%);
  text-align: center;
}
.text-align1{
  position:absolute; 
  top:80%;
  left:33%;
  transform:translateX(-50%);
  text-align: center;
}
.text-align2{
  position:absolute;
  top:80%;
  left:62%;
  transform:translateX(-50%);
  text-align: center;
}
.sach{
  position:absolute;
  bottom:20px;
  right:20px;
  width:200px;
  height:400px;
}

.sach img{
  width:100%;
  height:100%;
  object-fit:contain;
}

</style>
</head>

<body>

<div class="stars">
  <div class="star" style="top:10%; left:20%; animation-delay:0s;"></div>
  <div class="star" style="top:30%; left:40%; animation-delay:1s;"></div>
  <div class="star" style="top:50%; left:70%; animation-delay:2s;"></div>
  <div class="star" style="top:80%; left:10%; animation-delay:0.5s;"></div>
  <div class="star" style="top:60%; left:55%; animation-delay:1.5s;"></div>
  <div class="star" style="top:20%; left:85%; animation-delay:2.5s;"></div>
  <div class="star" style="top:75%; left:35%; animation-delay:0.8s;"></div>
  <div class="star" style="top:40%; left:15%; animation-delay:1.2s;"></div>
  <div class="star" style="top:90%; left:45%; animation-delay:2s;"></div>
  <div class="star" style="top:90%; left:80%; animation-delay:0.7s;"></div>
</div>
<div class="text-title text-align"><b>LƯU BÚT NGÀY <br>RA TRƯỜNG</b></div>
<div class="sach" style="top:30%; left:25%"><img src="sach.png"></div>
<div class="sach" style="top:30%; left:55%"><img src="sach.png"></div>

<br>khó quên</a></div>
<div class="text text-align2"><a href="chuanoi.html">Điều chưa<br>kịp nói</div>
</body>
</html>
